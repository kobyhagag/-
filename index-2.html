function Icon({ name, size = 16, color = 'currentColor', style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24"
      fill="none" stroke={color} strokeWidth="2"
      strokeLinecap="round" strokeLinejoin="round"
      style={{ flexShrink: 0, ...style }}
      dangerouslySetInnerHTML={{ __html: ICON_PATHS[name] || '' }} />
  );
}

const localStore = {
  get(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  }
};

const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);

const formatPhone = (raw) => {
  let d = (raw || '').replace(/\D/g, '');
  if (d.startsWith('972')) return d;
  if (d.startsWith('0')) return '972' + d.slice(1);
  return d ? '972' + d : '';
};

const prettyPhone = (raw) => {
  const d = (raw || '').replace(/\D/g, '');
  if (d.length === 10 && d.startsWith('05')) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
  return raw;
};

const formatDate = (ts) => {
  const d = new Date(ts);
  const date = d.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'2-digit' });
  const time = d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
  return date + ' ' + time;
};

// ============ SIGNATURE PAD ============
function SignaturePad({ onConfirm, onCancel, title = 'חתימה' }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const [hasInk, setHasInk] = useState(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#fafaf5';
    ctx.fillRect(0, 0, rect.width, rect.height);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };
  const start = (e) => {
    e.preventDefault();
    if (e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId);
    drawing.current = true;
    const { x, y } = getPos(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath(); ctx.moveTo(x, y);
  };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const { x, y } = getPos(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.lineTo(x, y); ctx.stroke();
    setHasInk(true);
  };
  const end = () => { drawing.current = false; };

  const clear = () => {
    const ctx = canvasRef.current.getContext('2d');
    const rect = canvasRef.current.getBoundingClientRect();
    ctx.fillStyle = '#fafaf5';
    ctx.fillRect(0, 0, rect.width, rect.height);
    setHasInk(false);
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, color: T.text }}>
        <Icon name="pen" size={18} color={T.primary} />
        <span style={{ fontWeight:600, fontSize:15 }}>{title}</span>
      </div>
      <div style={{ fontSize:12, color: T.textMuted }}>חתום באצבע בתוך המסגרת</div>
      <div style={{ background:'#fafaf5', borderRadius:10, border: '2px dashed ' + T.border,
        height: 200, position:'relative', overflow:'hidden' }}>
        <canvas ref={canvasRef}
          style={{ width:'100%', height:'100%', touchAction:'none', display:'block' }}
          onPointerDown={start} onPointerMove={move} onPointerUp={end}
          onPointerCancel={end} onPointerLeave={end} />
      </div>
      <div style={{ display:'flex', gap:8 }}>
        <button onClick={clear} style={{
          flex:'0 0 auto', padding:'10px 14px', background:'transparent',
          border: '1px solid ' + T.border, color: T.textMuted, borderRadius:8,
          fontSize:13, display:'flex', alignItems:'center', gap:6, cursor:'pointer'
        }}><Icon name="rotate" size={14} /> נקה</button>
        <button onClick={onCancel} style={{
          flex:1, padding:'10px 14px', background:'transparent',
          border: '1px solid ' + T.border, color: T.text, borderRadius:8, fontSize:14, cursor:'pointer'
        }}>ביטול</button>
        <button onClick={() => hasInk && onConfirm(canvasRef.current.toDataURL('image/png'))}
          disabled={!hasInk} style={{
          flex:2, padding:'10px 14px',
          background: hasInk ? T.primary : T.border,
          color: hasInk ? '#0f1310' : T.textMuted,
          border:'none', borderRadius:8, fontSize:14, fontWeight:600,
          cursor: hasInk ? 'pointer':'not-allowed',
          display:'flex', alignItems:'center', justifyContent:'center', gap:6
        }}><Icon name="check" size={16} /> אישור חתימה</button>
      </div>
    </div>
  );
}

// ============ MODAL ============
function Modal({ open, onClose, title, children, full = true }) {
  useEffect(() => {
    if (open) document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  if (!open) return null;
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', backdropFilter:'blur(4px)',
      zIndex:1000, display:'flex', alignItems: full?'stretch':'center', justifyContent:'center',
      animation:'fadeIn 0.2s ease-out'
    }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background: T.surface, width:'100%', maxWidth: 520,
        maxHeight: full ? '100%' : '90vh',
        borderRadius: full ? '16px 16px 0 0' : 16,
        marginTop: full ? 'auto' : 0,
        display:'flex', flexDirection:'column',
        border: '1px solid ' + T.border,
        animation:'slideUp 0.25s ease-out'
      }}>
        <div style={{
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'14px 16px', borderBottom: '1px solid ' + T.border
        }}>
          <h3 style={{ margin:0, color: T.text, fontSize:16, fontWeight:600 }}>{title}</h3>
          <button onClick={onClose} style={{
            background:'transparent', border:'none', color: T.textMuted,
            cursor:'pointer', padding:6, display:'flex'
          }}><Icon name="x" size={20} /></button>
        </div>
        <div style={{ overflowY:'auto', padding:16, flex:1 }}>{children}</div>
      </div>
    </div>
  );
}

function EquipmentForm({ initial, onSave, onDelete, onCancel }) {
  const [name, setName] = useState(initial?.name || '');
  const [category, setCategory] = useState(initial?.category || '');
  const [total, setTotal] = useState(initial?.total ?? 1);

  const save = () => {
    if (!name.trim() || total < 1) return;
    onSave({
      id: initial?.id || uid(),
      name: name.trim(), category: category.trim(),
      total: parseInt(total) || 1,
    });
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div>
        <label style={labelStyle}>שם הפריט</label>
        <input style={inputStyle} value={name} onChange={e=>setName(e.target.value)}
          placeholder="לדוגמה: M16 קצר" autoFocus />
      </div>
      <div>
        <label style={labelStyle}>קטגוריה (אופציונלי)</label>
        <input style={inputStyle} value={category} onChange={e=>setCategory(e.target.value)}
          placeholder="לדוגמה: נשק, אלקטרוניקה, אופטיקה" />
      </div>
      <div>
        <label style={labelStyle}>כמות במלאי</label>
        <input type="number" min="1" style={inputStyle} value={total}
          onChange={e=>setTotal(e.target.value)} />
      </div>
      <div style={{ display:'flex', gap:8, marginTop:8 }}>
        {initial && (
          <button onClick={()=>onDelete(initial.id)} style={{
            padding:'12px', background:'transparent',
            border: '1px solid ' + T.danger, color: T.danger, borderRadius:10,
            cursor:'pointer', display:'flex', alignItems:'center', gap:6
          }}><Icon name="trash" size={16} /></button>
        )}

          flex:1, padding:'12px', background:'transparent',

        }}>ביטול</button>

          flex:2, padding:'12px', background: T.primary, color:'#0f1310',
          border:'none', borderRadius:10, fontWeight:600, cursor:'pointer'
        }}>{initial ? 'שמור שינויים' : 'הוסף פריט'}</button>
      </div>

  );
}

// ============ SIGN-OUT FLOW ============
function SignoutFlow({ soldiers, equipment, getAvailable, onComplete, onCancel }) {
  const [step, setStep] = useState(1);
  const [soldierId, setSoldierId] = useState(null);
  const [cart, setCart] = useState({});
  const [search, setSearch] = useState('');

  const soldier = soldiers.find(s => s.id === soldierId);
  const cartItems = Object.entries(cart)
    .filter(([_, q]) => q > 0)
    .map(([id, q]) => {
      const eq = equipment.find(e => e.id === id);
      return eq ? { equipmentId: id, name: eq.name, quantity: q } : null;
    })
    .filter(Boolean);

  const filteredSoldiers = soldiers.filter(s =>
    s.name.includes(search) || (s.militaryId||'').includes(search));
  const filteredEquipment = equipment.filter(e =>
    e.name.includes(search) || (e.category||'').includes(search));

  const finalize = (signatureData) => {
    onComplete({
      id: uid(),
      soldierId, soldierName: soldier.name, soldierPhone: soldier.phone,
      items: cartItems,
      signoutTimestamp: Date.now(),
      signoutSignature: signatureData,
      status: 'active',
    });
  };

  if (step === 1) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        <div style={{ color: T.textMuted, fontSize:13 }}>שלב 1 מתוך 3 — בחר חייל</div>
        <div style={{ position:'relative' }}>
          <div style={{ position:'absolute', right:12, top:13, color: T.textMuted }}>
            <Icon name="search" size={16} />
          </div>
          <input style={{ ...inputStyle, paddingRight:36 }}
            placeholder="חפש שם או מספר אישי"
            value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        {soldiers.length === 0 && (
          <div style={{ padding:24, textAlign:'center', color: T.textMuted, fontSize:13 }}>
            לא קיימים חיילים במערכת.
          </div>
        )}
        <div style={{ display:'flex', flexDirection:'column', gap:6, maxHeight:'50vh', overflowY:'auto' }}>
          {filteredSoldiers.map(s => (
            <button key={s.id} onClick={()=>{ setSoldierId(s.id); setStep(2); setSearch(''); }}
              style={{
                padding:'12px 14px', background: T.surfaceHi, border: '1px solid ' + T.border,
                borderRadius:10, color: T.text, textAlign:'right', cursor:'pointer',
                display:'flex', alignItems:'center', justifyContent:'space-between'
              }}>
              <div>
                <div style={{ fontWeight:600 }}>{s.name}</div>
                <div style={{ fontSize:12, color: T.textMuted, marginTop:2 }}>
                  {s.militaryId && 'מ.א ' + s.militaryId + ' • '}{prettyPhone(s.phone)}
                </div>
              </div>
              <Icon name="chevronLeft" size={18} color={T.textMuted} />
            </button>
          ))}
        </div>
      </div>
    );
  }

  if (step === 2) {
    const totalItems = cartItems.reduce((s, i) => s + i.quantity, 0);
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        <div style={{ color: T.textMuted, fontSize:13, display:'flex', justifyContent:'space-between' }}>
          <span>שלב 2 מתוך 3 — בחר ציוד</span>
          <button onClick={()=>setStep(1)} style={{ background:'none', border:'none', color: T.primary, fontSize:13, cursor:'pointer' }}>
            ← {soldier?.name}
          </button>
        </div>
        <div style={{ position:'relative' }}>
          <div style={{ position:'absolute', right:12, top:13, color: T.textMuted }}>
            <Icon name="search" size={16} />
          </div>
          <input style={{ ...inputStyle, paddingRight:36 }}
            placeholder="חפש פריט" value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:6, maxHeight:'45vh', overflowY:'auto' }}>
          {filteredEquipment.map(eq => {
            const avail = getAvailable(eq.id);
            const inCart = cart[eq.id] || 0;
            const maxQty = avail + inCart;
            return (
              <div key={eq.id} style={{
                padding:'10px 12px', background: T.surfaceHi,
                border: '1px solid ' + (inCart > 0 ? T.primary : T.border),
                borderRadius:10, display:'flex', alignItems:'center', gap:10
              }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ color: T.text, fontWeight:500, fontSize:14 }}>{eq.name}</div>
                  <div style={{ fontSize:11, color: T.textMuted, marginTop:2 }}>
                    זמין: {avail}/{eq.total}
                    {eq.category && ' • ' + eq.category}
                  </div>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <button onClick={() => setCart(c => ({ ...c, [eq.id]: Math.max(0, (c[eq.id]||0) - 1) }))}
                    disabled={!inCart} style={{
                    width:30, height:30, borderRadius:6,
                    background: T.bg, border: '1px solid ' + T.border,
                    color: inCart ? T.text : T.textMuted,
                    cursor: inCart?'pointer':'not-allowed', fontSize:18
                  }}>−</button>
                  <div style={{ minWidth:26, textAlign:'center', color: T.text, fontWeight:600 }}>{inCart}</div>
                  <button onClick={() => {
                    if ((cart[eq.id]||0) < maxQty)
                      setCart(c => ({ ...c, [eq.id]: (c[eq.id]||0) + 1 }));
                  }} disabled={inCart >= maxQty} style={{
                    width:30, height:30, borderRadius:6,
                    background: inCart < maxQty ? T.primary : T.border,
                    border:'none',
                    color: inCart < maxQty ? '#0f1310' : T.textMuted,
                    cursor: inCart < maxQty?'pointer':'not-allowed', fontSize:18, fontWeight:600
                  }}>+</button>
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={()=>setStep(3)} disabled={totalItems === 0} style={{
          padding:'14px', background: totalItems ? T.primary : T.border,
          color: totalItems ? '#0f1310' : T.textMuted,
          border:'none', borderRadius:10, fontWeight:600, cursor: totalItems?'pointer':'not-allowed',
          display:'flex', alignItems:'center', justifyContent:'center', gap:8
        }}>
          המשך לחתימה ({totalItems} פריטים)
        </button>
      </div>
    );
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ color: T.textMuted, fontSize:13, display:'flex', justifyContent:'space-between' }}>
        <span>שלב 3 מתוך 3 — חתימה</span>
        <button onClick={()=>setStep(2)} style={{ background:'none', border:'none', color: T.primary, fontSize:13, cursor:'pointer' }}>
          ← חזור לציוד
        </button>
      </div>
      <div style={{ background: T.surfaceHi, padding:12, borderRadius:10, border: '1px solid ' + T.border }}>
        <div style={{ color: T.text, fontWeight:600, marginBottom:6 }}>{soldier.name}</div>
        <div style={{ color: T.textMuted, fontSize:12 }}>
          {cartItems.map(i => i.name + ' ×' + i.quantity).join(' • ')}
        </div>
      </div>
      <SignaturePad
        title={'חתימת ' + soldier.name + ' על קבלת הציוד'}
        onConfirm={finalize}
        onCancel={onCancel} />
    </div>
  );
}

// ============ RETURN FLOW ============
function ReturnFlow({ signout, onComplete, onCancel }) {
  const [step, setStep] = useState(1);

  const stillOut = {};
  signout.items.forEach(i => {
    const returned = (signout.returns || []).reduce((sum, r) => {
      const ri = r.returnedItems.find(x => x.equipmentId === i.equipmentId);
      return sum + (ri?.quantity || 0);
    }, 0);
    stillOut[i.equipmentId] = i.quantity - returned;
  });

  const [returnQty, setReturnQty] = useState(() => {
    const obj = {};
    signout.items.forEach(i => { obj[i.equipmentId] = stillOut[i.equipmentId]; });
    return obj;
  });

  const returnedItems = signout.items
    .map(i => ({ ...i, quantity: returnQty[i.equipmentId] || 0 }))
    .filter(i => i.quantity > 0);

  const totalReturn = returnedItems.reduce((s, i) => s + i.quantity, 0);
  const isFullReturn = signout.items.every(i =>
    (returnQty[i.equipmentId] || 0) === stillOut[i.equipmentId]);

  const finalize = (signatureData) => {
    onComplete({
      signoutId: signout.id,
      returnedItems,
      returnTimestamp: Date.now(),
      returnSignature: signatureData,
      isFullReturn,
    });
  };

  if (step === 1) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <div style={{ color: T.textMuted, fontSize:13 }}>
          זיכוי עבור <span style={{ color: T.text, fontWeight:600 }}>{signout.soldierName}</span>
        </div>
        <div style={{ fontSize:12, color: T.textMuted }}>
          בחר את הכמות המוחזרת לכל פריט (אפשר זיכוי חלקי)
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {signout.items.filter(i => stillOut[i.equipmentId] > 0).map(item => {
            const cur = returnQty[item.equipmentId] || 0;
            const max = stillOut[item.equipmentId];
            return (
              <div key={item.equipmentId} style={{
                padding:'10px 12px', background: T.surfaceHi,
                border: '1px solid ' + T.border, borderRadius:10,
                display:'flex', alignItems:'center', gap:10
              }}>
                <div style={{ flex:1 }}>
                  <div style={{ color: T.text, fontWeight:500, fontSize:14 }}>{item.name}</div>
                  <div style={{ fontSize:11, color: T.textMuted, marginTop:2 }}>בהחתמה: {max}</div>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <button onClick={() => setReturnQty(q => ({ ...q, [item.equipmentId]: Math.max(0, cur - 1) }))}
                    disabled={cur === 0}
                    style={{
                      width:30, height:30, borderRadius:6,
                      background: T.bg, border: '1px solid ' + T.border,
                      color: cur ? T.text : T.textMuted,
                      cursor: cur?'pointer':'not-allowed', fontSize:18
                    }}>−</button>
                  <div style={{ minWidth:30, textAlign:'center', color: T.text, fontWeight:600 }}>{cur}</div>
                  <button onClick={() => setReturnQty(q => ({ ...q, [item.equipmentId]: Math.min(max, cur + 1) }))}
                    disabled={cur >= max}
                    style={{
                      width:30, height:30, borderRadius:6,
                      background: cur < max ? T.primary : T.border, border:'none',
                      color: cur < max ? '#0f1310' : T.textMuted,
                      cursor: cur < max ? 'pointer':'not-allowed', fontSize:18, fontWeight:600
                    }}>+</button>
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={()=>setStep(2)} disabled={totalReturn === 0} style={{
          padding:'14px', background: totalReturn ? T.primary : T.border,
          color: totalReturn ? '#0f1310' : T.textMuted,
          border:'none', borderRadius:10, fontWeight:600,
          cursor: totalReturn?'pointer':'not-allowed'
        }}>
          המשך לחתימה ({totalReturn} פריטים{isFullReturn ? ' — זיכוי מלא' : ' — חלקי'})
        </button>
      </div>
    );
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ color: T.textMuted, fontSize:13, display:'flex', justifyContent:'space-between' }}>
        <span>חתימה על זיכוי</span>
        <button onClick={()=>setStep(1)} style={{ background:'none', border:'none', color: T.primary, fontSize:13, cursor:'pointer' }}>
          ← חזור
        </button>
      </div>
      <SignaturePad
        title={'חתימת ' + signout.soldierName + ' על החזרת הציוד'}
        onConfirm={finalize}
        onCancel={onCancel} />
    </div>
  );
}

      ))}
    </div>
  );
}

// ============ EXCEL IMPORT ============
function ImportSoldiers({ existingSoldiers, onImport, onCancel }) {
  const [step, setStep] = useState(1); // 1: pick file, 2: preview, 3: done
  const [parseError, setParseError] = useState('');
  const [parsedRows, setParsedRows] = useState([]);
  const [matchInfo, setMatchInfo] = useState({ new: [], updated: [], invalid: [] });
  const fileInputRef = useRef(null);

  // Detect column based on header text
  const findColumn = (headers, candidates) => {
    for (let i = 0; i < headers.length; i++) {
      const h = String(headers[i] || '').trim();
      for (const c of candidates) {
        if (h.includes(c)) return i;
      }
    }
    return -1;
  };

  const handleFile = async (file) => {
    setParseError('');
    if (!file) return;
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      if (!sheet) throw new Error('הקובץ ריק');
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      if (rows.length < 2) throw new Error('הקובץ חייב לכלול שורת כותרת ולפחות חייל אחד');

      // Auto-detect columns from header
      const headers = rows[0].map(h => String(h));
      const nameCol = findColumn(headers, ['שם מלא', 'שם', 'name']);
      const idCol = findColumn(headers, ['מספר אישי', 'מס אישי', 'מ.א', 'מא', 'id']);
      const phoneCol = findColumn(headers, ['טלפון', 'נייד', 'phone', 'mobile']);

      if (nameCol === -1 || idCol === -1 || phoneCol === -1) {
        throw new Error('לא נמצאו עמודות. ודא שכותרות הקובץ הן: שם מלא, מספר אישי, טלפון');
      }

      const parsed = rows.slice(1).map((row, idx) => ({
        rowIndex: idx + 2,
        name: String(row[nameCol] || '').trim(),
        militaryId: String(row[idCol] || '').trim(),
        phone: String(row[phoneCol] || '').trim(),
      }));

      // Classify rows
      const newOnes = [];
      const updated = [];
      const invalid = [];
      parsed.forEach(r => {
        if (!r.name || !r.phone) {
          invalid.push({ ...r, reason: !r.name ? 'חסר שם' : 'חסר טלפון' });
          return;
        }
        if (!r.militaryId) {
          invalid.push({ ...r, reason: 'חסר מספר אישי' });
          return;
        }
        const existing = existingSoldiers.find(s => s.militaryId === r.militaryId);
        if (existing) {
          if (existing.name !== r.name || existing.phone !== r.phone) {
            updated.push({ ...r, existingId: existing.id });
          }
          // If identical, skip
        } else {
          newOnes.push(r);
        }
      });

      setParsedRows(parsed);
      setMatchInfo({ new: newOnes, updated, invalid });
      setStep(2);
    } catch (e) {
      setParseError(e.message || 'שגיאה בקריאת הקובץ');
    }
  };

  const confirmImport = () => {
    const toSave = [
      ...matchInfo.new.map(r => ({
        id: uid(),
        name: r.name,
        militaryId: r.militaryId,
        phone: r.phone,
      })),
      ...matchInfo.updated.map(r => ({
        id: r.existingId,
        name: r.name,
        militaryId: r.militaryId,
        phone: r.phone,
      })),
    ];
    onImport(toSave);
    setStep(3);
  };

  if (step === 1) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <div style={{
          background: T.surfaceHi, border: '1px solid ' + T.border,
          borderRadius:10, padding:14, fontSize:13, color: T.textMuted, lineHeight:1.6
        }}>
          <div style={{ fontWeight:600, color: T.text, marginBottom:8 }}>פורמט הקובץ</div>
          קובץ Excel (.xlsx) או CSV עם 3 עמודות בשורה הראשונה:
          <div style={{
            marginTop:8, padding:'8px 10px', background: T.bg, borderRadius:6,
            fontFamily:'ui-monospace, Menlo, monospace', fontSize:12, color: T.accent
          }}>
            שם מלא | מספר אישי | טלפון
          </div>
          <div style={{ marginTop:10, fontSize:12 }}>
            • שורות עם אותו מספר אישי יעודכנו אוטומטית<br/>
            • שורות חדשות יתווספו<br/>
            • שורות עם נתונים חסרים יוצגו לפני הייבוא
          </div>
        </div>

        <input ref={fileInputRef} type="file" accept=".xlsx,.xls,.csv"
          style={{ display:'none' }}
          onChange={e => handleFile(e.target.files[0])} />

        <button onClick={() => fileInputRef.current?.click()} style={{
          padding:'14px', background: T.primary, color:'#0f1310',
          border:'none', borderRadius:10, fontWeight:600, fontSize:15,
          cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8
        }}>
          <Icon name="upload" size={18} /> בחר קובץ אקסל
        </button>

        {parseError && (
          <div style={{
            background: T.danger + '22', border: '1px solid ' + T.danger,
            borderRadius:10, padding:12, fontSize:13, color: T.danger,
            display:'flex', alignItems:'start', gap:8
          }}>
            <Icon name="alertTriangle" size={16} style={{ marginTop:1 }} />
            <div>{parseError}</div>
          </div>
        )}

        <button onClick={onCancel} style={{
          padding:'12px', background:'transparent',
          border: '1px solid ' + T.border, color: T.text, borderRadius:10, cursor:'pointer'
        }}>ביטול</button>
      </div>
    );
  }

  if (step === 2) {
    const { new: newOnes, updated, invalid } = matchInfo;
    const total = newOnes.length + updated.length;
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
          <div style={{ background: T.success + '22', borderRadius:10, padding:'10px 8px', textAlign:'center' }}>
            <div style={{ fontSize:22, fontWeight:700, color: T.success }}>{newOnes.length}</div>
            <div style={{ fontSize:11, color: T.textMuted }}>חדשים</div>
          </div>
          <div style={{ background: T.info + '22', borderRadius:10, padding:'10px 8px', textAlign:'center' }}>
            <div style={{ fontSize:22, fontWeight:700, color: T.info }}>{updated.length}</div>
            <div style={{ fontSize:11, color: T.textMuted }}>לעדכון</div>
          </div>
          <div style={{ background: T.danger + '22', borderRadius:10, padding:'10px 8px', textAlign:'center' }}>
            <div style={{ fontSize:22, fontWeight:700, color: T.danger }}>{invalid.length}</div>
            <div style={{ fontSize:11, color: T.textMuted }}>דילוג</div>
          </div>
        </div>

        <div style={{ maxHeight:'45vh', overflowY:'auto', display:'flex', flexDirection:'column', gap:6 }}>
          {newOnes.length > 0 && (
            <>
              <div style={{ color: T.success, fontSize:11, fontWeight:600,
                textTransform:'uppercase', letterSpacing:1, marginTop:6 }}>חיילים חדשים</div>
              {newOnes.map((r, i) => (
                <div key={'n'+i} style={{
                  padding:'8px 12px', background: T.surfaceHi, borderRadius:8,
                  display:'flex', justifyContent:'space-between', alignItems:'center', gap:8
                }}>
                  <div style={{ minWidth:0, flex:1 }}>
                    <div style={{ color: T.text, fontWeight:500, fontSize:13 }}>{r.name}</div>
                    <div style={{ color: T.textMuted, fontSize:11 }}>
                      {r.militaryId} • {prettyPhone(r.phone)}
                    </div>
                  </div>
                  <div style={{ color: T.success, fontSize:11, fontWeight:600 }}>חדש</div>
                </div>
              ))}
            </>
          )}

          {updated.length > 0 && (
            <>
              <div style={{ color: T.info, fontSize:11, fontWeight:600,
                textTransform:'uppercase', letterSpacing:1, marginTop:10 }}>יעודכנו</div>
              {updated.map((r, i) => {
                const existing = existingSoldiers.find(s => s.id === r.existingId);
                return (
                  <div key={'u'+i} style={{
                    padding:'8px 12px', background: T.surfaceHi, borderRadius:8,
                    display:'flex', justifyContent:'space-between', alignItems:'center', gap:8
                  }}>
                    <div style={{ minWidth:0, flex:1 }}>
                      <div style={{ color: T.text, fontWeight:500, fontSize:13 }}>{r.name}</div>
                      <div style={{ color: T.textMuted, fontSize:11 }}>
                        {r.militaryId} • {prettyPhone(r.phone)}
                      </div>
                      {existing && (
                        <div style={{ color: T.textMuted, fontSize:10, marginTop:2,
                          textDecoration:'line-through', opacity:0.6 }}>
                          {existing.name} • {prettyPhone(existing.phone)}
                        </div>
                      )}
                    </div>
                    <div style={{ color: T.info, fontSize:11, fontWeight:600 }}>עדכון</div>
                  </div>
                );
              })}
            </>
          )}

          {invalid.length > 0 && (
            <>
              <div style={{ color: T.danger, fontSize:11, fontWeight:600,
                textTransform:'uppercase', letterSpacing:1, marginTop:10 }}>שורות שלא ייובאו</div>
              {invalid.map((r, i) => (
                <div key={'i'+i} style={{
                  padding:'8px 12px', background: T.danger + '11',
                  border: '1px solid ' + T.danger + '33',
                  borderRadius:8, fontSize:12
                }}>
                  <div style={{ color: T.text, fontSize:13 }}>
                    שורה {r.rowIndex}: {r.name || '(ללא שם)'}
                  </div>
                  <div style={{ color: T.danger, fontSize:11, marginTop:2 }}>{r.reason}</div>
                </div>
              ))}
            </>
          )}

          {total === 0 && invalid.length === 0 && (
            <div style={{ padding:24, textAlign:'center', color: T.textMuted, fontSize:13 }}>
              כל החיילים בקובץ כבר קיימים במערכת ללא שינוי
            </div>
          )}
        </div>

        <div style={{ display:'flex', gap:8 }}>
          <button onClick={() => { setStep(1); setParsedRows([]); setMatchInfo({ new:[], updated:[], invalid:[] }); }}
            style={{
              flex:1, padding:'12px', background:'transparent',
              border: '1px solid ' + T.border, color: T.text, borderRadius:10, cursor:'pointer'
            }}>חזור</button>
          <button onClick={confirmImport} disabled={total === 0} style={{
            flex:2, padding:'12px',
            background: total > 0 ? T.primary : T.border,
            color: total > 0 ? '#0f1310' : T.textMuted,
            border:'none', borderRadius:10, fontWeight:600,
            cursor: total > 0 ? 'pointer' : 'not-allowed'
          }}>
            {total > 0 ? 'אשר ייבוא של ' + total + ' חיילים' : 'אין מה לייבא'}
          </button>
        </div>
      </div>
    );
  }

  // step 3 - done
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16, alignItems:'center', padding:'20px 0' }}>
      <div style={{
        width:60, height:60, borderRadius:30, background: T.success + '22',
        display:'flex', alignItems:'center', justifyContent:'center'
      }}>
        <Icon name="check" size={32} color={T.success} />
      </div>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:17, fontWeight:600, color: T.text }}>הייבוא הושלם</div>
        <div style={{ color: T.textMuted, fontSize:13, marginTop:6 }}>
          {matchInfo.new.length > 0 && matchInfo.new.length + ' חיילים חדשים נוספו. '}
          {matchInfo.updated.length > 0 && matchInfo.updated.length + ' חיילים עודכנו.'}
        </div>
      </div>
      <button onClick={onCancel} style={{
        width:'100%', padding:'12px', background: T.primary, color:'#0f1310',
        border:'none', borderRadius:10, fontWeight:600, cursor:'pointer'
      }}>סגור</button>
    </div>
  );
}

function HistoryTab({ signouts, onShowDetails }) {
  const events = [];
  signouts.forEach(s => {
    events.push({ type: 'signout', timestamp: s.signoutTimestamp, signout: s, performedBy: s.signoutPerformedBy });
    if (s.returns) {
      s.returns.forEach(r => {
        events.push({ type: 'return', timestamp: r.returnTimestamp, signout: s, ret: r, performedBy: r.returnPerformedBy });
      });
    }
  });
  events.sort((a, b) => b.timestamp - a.timestamp);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:8, paddingBottom:80 }}>
      <div style={{ color: T.textMuted, fontSize:12, fontWeight:600, marginBottom:4,

      </div>

          padding:32, background: T.surface, border: '1px dashed ' + T.border,

        }}>

            <Icon name="list" size={32} />
          </div>
          <div>אין היסטוריה עדיין</div>

        );
      })}

  );
}

function SignoutDetails({ signout, onClose, onReturn }) {
  const remainingByItem = {};
  signout.items.forEach(i => {
    const returned = (signout.returns || []).reduce((sum, r) => {
      const ri = r.returnedItems.find(x => x.equipmentId === i.equipmentId);
      return sum + (ri?.quantity || 0);
    }, 0);
    remainingByItem[i.equipmentId] = i.quantity - returned;
  });
  const anyRemaining = Object.values(remainingByItem).some(v => v > 0);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div>
        <div style={{ color: T.textMuted, fontSize:11, marginBottom:4 }}>חייל</div>

          <div style={{ color: T.text, fontSize:14 }}>{formatDate(signout.signoutTimestamp)}</div>

        {signout.signoutPerformedBy && (

            <div style={{ color: T.textMuted, fontSize:11, marginBottom:4 }}>החתים</div>
            <div style={{ color: T.info, fontSize:14, fontWeight:600 }}>{signout.signoutPerformedBy}</div>
          </div>
        )}
      </div>
      <div>
        <div style={{ color: T.textMuted, fontSize:11, marginBottom:6 }}>פריטים</div>
        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {signout.items.map(i => (
            <div key={i.equipmentId} style={{
              padding:'8px 12px', background: T.surfaceHi, borderRadius:8,
              display:'flex', justifyContent:'space-between', alignItems:'center'
            }}>
              <div>
                <span style={{ color: T.text }}>{i.name}</span>
                {remainingByItem[i.equipmentId] < i.quantity && remainingByItem[i.equipmentId] > 0 && (
                  <span style={{ color: T.textMuted, fontSize:11, marginRight:6 }}>
                    (נותרו {remainingByItem[i.equipmentId]})

                )}
                {remainingByItem[i.equipmentId] === 0 && (
                  <span style={{ color: T.success, fontSize:11, marginRight:6 }}>✓ הוחזר</span>
                )}
              </div>
              <span style={{ color: T.accent, fontFamily:'ui-monospace, Menlo, monospace' }}>×{i.quantity}</span>
            </div>
          ))}
        </div>
      </div>
      {signout.signoutSignature && (
        <div>
          <div style={{ color: T.textMuted, fontSize:11, marginBottom:6 }}>חתימת החתמה</div>
          <img src={signout.signoutSignature} alt="חתימה" style={{
            width:'100%', maxHeight:140, objectFit:'contain',
            background:'#fafaf5', borderRadius:8, border: '1px solid ' + T.border
          }} />
        </div>
      )}
      {signout.returns?.length > 0 && (
        <div>
          <div style={{ color: T.textMuted, fontSize:11, marginBottom:6 }}>זיכויים</div>
          {signout.returns.map((r, idx) => (
            <div key={idx} style={{ background: T.surfaceHi, borderRadius:8, padding:10, marginBottom:6 }}>
              <div style={{ fontSize:12, color: T.success, fontWeight:600, marginBottom:4,
                display:'flex', justifyContent:'space-between' }}>
                <span>{formatDate(r.returnTimestamp)}</span>
                {r.returnPerformedBy && (
                  <span style={{ color: T.info, fontWeight:400 }}>ע״י {r.returnPerformedBy}</span>
                )}
              </div>
              {r.returnedItems.map(i => (
                <div key={i.equipmentId} style={{
                  display:'flex', justifyContent:'space-between', fontSize:13, color: T.text
                }}>
                  <span>{i.name}</span>
                  <span style={{ color: T.success, fontFamily:'ui-monospace, Menlo, monospace' }}>×{i.quantity}</span>
                </div>
              ))}
              {r.returnSignature && (
                <img src={r.returnSignature} alt="חתימת זיכוי" style={{
                  marginTop:6, width:'100%', maxHeight:80, objectFit:'contain',
                  background:'#fafaf5', borderRadius:6
                }} />
              )}
            </div>
          ))}
        </div>
      )}
      {anyRemaining && signout.status === 'active' && (
        <button onClick={()=>{ onClose(); onReturn(signout); }} style={{
          padding:'14px', background: T.primary, color:'#0f1310',
          border:'none', borderRadius:10, fontWeight:600, cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center', gap:8
        }}>
          <Icon name="rotate" size={16} /> בצע זיכוי
        </button>
      )}
    </div>
  );
}

    dbRef.current = database;

    const connRefHandle = database.ref('.info/connected');
    const connHandler = (snap) => setConnected(!!snap.val());
    connRefHandle.on('value', connHandler);

    const handlers = [];
    const setup = (path, setter) => {
      const ref = database.ref(path);
      const handler = (snap) => {
        const data = snap.val() || {};
        setter(Object.values(data));
      };
      ref.on('value', handler);
      handlers.push({ ref, handler });
    };
    setup('equipment', setEquipment);
    setup('soldiers', setSoldiers);
    setup('signouts', setSignouts);

    return () => {
      connRefHandle.off('value', connHandler);
      handlers.forEach(h => h.ref.off('value', h.handler));
    };
  }, []);

  const getAvailable = useCallback((equipmentId) => {
    const eq = equipment.find(e => e.id === equipmentId);
    if (!eq) return 0;
    let out = 0;
    signouts.forEach(s => {
      if (s.status !== 'active') return;
      const item = s.items?.find(i => i.equipmentId === equipmentId);
      if (!item) return;
      const returned = (s.returns || []).reduce((sum, r) => {
        const ri = r.returnedItems?.find(i => i.equipmentId === equipmentId);
        return sum + (ri?.quantity || 0);
      }, 0);
      out += item.quantity - returned;
    });
    return eq.total - out;
  }, [equipment, signouts]);

  const activeSignouts = signouts.filter(s => s.status === 'active');
  const stats = {
    activeCount: activeSignouts.length,
    outItems: activeSignouts.reduce((sum, s) => {
      const total = (s.items||[]).reduce((a, i) => a + i.quantity, 0);
      const returned = (s.returns || []).reduce((a, r) =>
        a + (r.returnedItems||[]).reduce((b, i) => b + i.quantity, 0), 0);
      return sum + total - returned;
    }, 0),
    soldierCount: soldiers.length,
  };

  const saveEquipment = (eq) => {
    dbRef.current?.ref('equipment/' + eq.id).set(eq);
    setModal(null);
  };
  const deleteEquipment = (id) => {
    if (!window.confirm('למחוק את הפריט מהמלאי?')) return;
    dbRef.current?.ref('equipment/' + id).remove();
    setModal(null);
  };
  const saveSoldier = (s) => {
    dbRef.current?.ref('soldiers/' + s.id).set(s);
    setModal(null);
  };
  const deleteSoldier = (id) => {
    if (!window.confirm('למחוק את החייל? היסטוריה תישמר.')) return;
    dbRef.current?.ref('soldiers/' + id).remove();
    setModal(null);
  };

  const bulkImportSoldiers = (newSoldiers) => {
    if (!dbRef.current || newSoldiers.length === 0) return;
    const updates = {};
    newSoldiers.forEach(s => { updates['soldiers/' + s.id] = s; });
    dbRef.current.ref().update(updates);
  };

  const completeSignout = (signoutData) => {
    const fullData = { ...signoutData, signoutPerformedBy: userName };
    dbRef.current?.ref('signouts/' + fullData.id).set(fullData);
    const message = buildSignoutMessage(
      { name: fullData.soldierName },
      fullData.items,
      fullData.id.slice(0, 6).toUpperCase(),
      userName
    );
    setModal({
      type: 'whatsapp',
      data: { phone: fullData.soldierPhone, message, label: 'הודעת אישור החתמה' }
    });
  };

  const completeReturn = ({ signoutId, returnedItems, returnTimestamp, returnSignature, isFullReturn }) => {
    const s = signouts.find(x => x.id === signoutId);
    if (!s) return;
    const newReturn = { returnedItems, returnTimestamp, returnSignature, returnPerformedBy: userName };
    const returns = [...(s.returns || []), newReturn];
    const totalReturned = {};
    returns.forEach(r => r.returnedItems.forEach(i => {
      totalReturned[i.equipmentId] = (totalReturned[i.equipmentId] || 0) + i.quantity;
    }));
    const fullyReturned = s.items.every(i =>
      (totalReturned[i.equipmentId] || 0) >= i.quantity);
    const updated = { ...s, returns, status: fullyReturned ? 'returned' : 'active' };
    dbRef.current?.ref('signouts/' + s.id).set(updated);

    const message = buildReturnMessage(
      { name: s.soldierName }, returnedItems, s.id.slice(0, 6).toUpperCase(), userName
    );
    setModal({
      type: 'whatsapp',
      data: {
        phone: s.soldierPhone, message,
        label: isFullReturn ? 'זיכוי מלא' : 'זיכוי חלקי',
      }
    });
  };

  return (
    <div dir="rtl" style={{ minHeight:'100vh', background: T.bg, color: T.text, paddingBottom: 70 }}>
      <header style={{
        padding:'10px 14px', background: T.surface,
        borderBottom: '1px solid ' + T.border,
        position:'sticky', top:0, zIndex:50,
        display:'flex', alignItems:'center', justifyContent:'space-between', gap:8
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, minWidth:0 }}>
          <div style={{
            width:32, height:32, borderRadius:8,
            background: 'linear-gradient(135deg, ' + T.primary + ', ' + T.primaryDark + ')',
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
          }}>
            <Icon name="package" size={17} color="#0f1310" />
          </div>
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:14, fontWeight:700, color: T.text, lineHeight:1.1 }}>ניהול ציוד</div>
            <div style={{ fontSize:10, color: T.textMuted, display:'flex', alignItems:'center', gap:4, marginTop:2 }}>
              <Icon name={connected ? 'cloud' : 'cloudOff'} size={10}
                color={connected ? T.success : T.danger}
                style={connected ? {} : { animation: 'pulse 1.5s infinite' }} />
              <span>{connected ? 'מסונכרן' : 'לא מחובר'}</span>
              <span style={{ opacity:0.5 }}>•</span>
              <span>{userName}</span>
            </div>
          </div>
        </div>
        <button onClick={()=>setModal({ type:'settings' })} style={{
          background:'transparent', border: '1px solid ' + T.border, color: T.textMuted,
          padding:'6px 10px', borderRadius:8, cursor:'pointer', fontSize:12
        }}>
          הגדרות
        </button>
      </header>

      <main style={{ padding:'14px' }}>
        {tab === 'home' && (
          <HomeTab stats={stats} activeSignouts={activeSignouts}
            onNewSignout={() => {
              if (soldiers.length === 0) { alert('הוסף לפחות חייל אחד'); setTab('soldiers'); return; }
              if (equipment.length === 0) { alert('הוסף לפחות פריט אחד'); setTab('inventory'); return; }
              setModal({ type:'newSignout' });
            }}
            onReturn={(s) => setModal({ type:'return', data: s })}
            onShowDetails={(s) => setModal({ type:'details', data: s })} />
        )}
        {tab === 'inventory' && (
          <InventoryTab equipment={equipment} getAvailable={getAvailable}
            onAdd={() => setModal({ type:'equipment' })}
            onEdit={(eq) => setModal({ type:'equipment', data: eq })} />
        )}
        {tab === 'soldiers' && (
          <SoldiersTab soldiers={soldiers} signouts={signouts}
            onAdd={() => setModal({ type:'soldier' })}
            onEdit={(s) => setModal({ type:'soldier', data: s })}
            onImport={() => setModal({ type:'importSoldiers' })} />
        )}
        {tab === 'history' && (
          <HistoryTab signouts={signouts}
            onShowDetails={(s) => setModal({ type:'details', data: s })} />
        )}
      </main>

      <nav style={{
        position:'fixed', bottom:0, right:0, left:0,
        background: T.surface, borderTop: '1px solid ' + T.border,
        display:'flex', justifyContent:'space-around',
        padding:'6px 4px 10px', zIndex:40,
        paddingBottom: 'max(10px, env(safe-area-inset-bottom))'
      }}>
        {[
          { id:'home', label:'בית', icon: 'home' },
          { id:'inventory', label:'מלאי', icon: 'package' },
          { id:'soldiers', label:'חיילים', icon: 'users' },
          { id:'history', label:'היסטוריה', icon: 'list' },
        ].map(item => (
          <button key={item.id} onClick={()=>setTab(item.id)} style={{
            flex:1, background:'transparent', border:'none', cursor:'pointer',
            color: tab === item.id ? T.primary : T.textMuted,
            display:'flex', flexDirection:'column', alignItems:'center', gap:2,
            padding:'8px 4px'
          }}>
            <Icon name={item.icon} size={20} />
            <span style={{ fontSize:11, fontWeight: tab === item.id ? 600 : 400 }}>{item.label}</span>
          </button>
        ))}
      </nav>

      <Modal open={modal?.type === 'equipment'} onClose={()=>setModal(null)}
        title={modal?.data ? 'עריכת פריט' : 'פריט חדש'} full={false}>
        <EquipmentForm initial={modal?.data} onSave={saveEquipment}
          onDelete={deleteEquipment} onCancel={()=>setModal(null)} />
      </Modal>
      <Modal open={modal?.type === 'soldier'} onClose={()=>setModal(null)}
        title={modal?.data ? 'עריכת חייל' : 'חייל חדש'} full={false}>
        <SoldierForm initial={modal?.data} onSave={saveSoldier}
          onDelete={deleteSoldier} onCancel={()=>setModal(null)} />
      </Modal>
      <Modal open={modal?.type === 'importSoldiers'} onClose={()=>setModal(null)}
        title="ייבוא חיילים מאקסל" full={false}>
        <ImportSoldiers existingSoldiers={soldiers}
          onImport={bulkImportSoldiers}
          onCancel={()=>setModal(null)} />
      </Modal>
      <Modal open={modal?.type === 'newSignout'} onClose={()=>setModal(null)} title="החתמה חדשה">
        <SignoutFlow soldiers={soldiers} equipment={equipment}
          getAvailable={getAvailable} onComplete={completeSignout}
          onCancel={()=>setModal(null)} />
      </Modal>
      <Modal open={modal?.type === 'return'} onClose={()=>setModal(null)} title="זיכוי / החזרה">
        {modal?.data && (
          <ReturnFlow signout={modal.data} onComplete={completeReturn}
            onCancel={()=>setModal(null)} />
        )}
      </Modal>
      <Modal open={modal?.type === 'whatsapp'} onClose={()=>setModal(null)}
        title="שליחת אישור בוואטסאפ" full={false}>
        {modal?.data && (
          <WhatsAppPrompt phone={modal.data.phone} message={modal.data.message}
            label={modal.data.label} onClose={()=>setModal(null)} />
        )}
      </Modal>
      <Modal open={modal?.type === 'details'} onClose={()=>setModal(null)} title="פרטי החתמה" full={false}>
        {modal?.data && (() => {
          const fresh = signouts.find(s => s.id === modal.data.id) || modal.data;
          return (
            <SignoutDetails signout={fresh} onClose={()=>setModal(null)}
              onReturn={(s)=>setModal({ type:'return', data: s })} />
          );
        })()}
      </Modal>
      <Modal open={modal?.type === 'settings'} onClose={()=>setModal(null)} title="הגדרות" full={false}>
        <SettingsModal userName={userName} onChangeName={onChangeUserName}
          onLogout={onLogout} onClose={()=>setModal(null)} />
      </Modal>
    </div>
  );
}

function App() {
  const [userName, setUserName] = useState(() => localStore.get('userName', ''));

  const handleLogin = (name) => {
    localStore.set('userName', name);
    setUserName(name);
  };

  const handleChangeName = (name) => {
    localStore.set('userName', name);
    setUserName(name);
  };

  const handleLogout = () => {
    localStorage.removeItem('userName');
    setUserName('');
  };

  if (!userName) {
    return <WelcomeScreen onComplete={handleLogin} />;
  }
  return <MainApp userName={userName}
    onChangeUserName={handleChangeName}
    onLogout={handleLogout} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
